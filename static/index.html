<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleamarketfrance — eBay SEO Rewriter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1612;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #8b3a2a;
    --sage: #4a5c4e;
    --border: #d4c9b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--dark); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 40px 20px; }
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
  .container { max-width: 900px; margin: 0 auto; }
  header { border-bottom: 2px solid var(--gold); padding-bottom: 24px; margin-bottom: 40px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header span { font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
  .card { background: white; border: 1px solid var(--border); border-radius: 2px; padding: 28px; margin-bottom: 20px; }
  .card-h2 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; font-style: italic; color: var(--rust); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .card-h2::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--rust); }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--sage); margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); background: var(--cream); font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dark); border-radius: 2px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--gold); }
  input[type="password"] { letter-spacing: 2px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  button { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 28px; border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--dark); color: var(--cream); width: 100%; }
  .btn-primary:hover { background: var(--rust); }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; color: #999; }
  .btn-danger { background: var(--rust); color: white; width: 100%; }
  .btn-danger:hover { background: #6e2e20; }
  .btn-danger:disabled { background: var(--border); cursor: not-allowed; color: #999; }
  .btn-small { background: var(--sage); color: white; font-size: 10px; padding: 8px 16px; }
  .btn-small:hover { background: var(--dark); }
  .btn-skip { background: transparent; color: #999; border: 1px solid var(--border); font-size: 10px; padding: 8px 16px; }
  .btn-skip:hover { border-color: var(--dark); color: var(--dark); }
  #status { padding: 14px; border-radius: 2px; font-size: 11px; margin-bottom: 20px; display: none; }
  #status.info    { background: #e8f0e9; border: 1px solid var(--sage);  color: var(--sage);  display: block; }
  #status.error   { background: #f5e8e6; border: 1px solid var(--rust);  color: var(--rust);  display: block; }
  #status.success { background: #e8f0e9; border: 1px solid var(--sage);  color: var(--sage);  display: block; }
  .listings-grid { display: flex; flex-direction: column; gap: 16px; }
  .listing-item { border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .listing-header { background: var(--cream); padding: 14px 18px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); gap: 12px; }
  .listing-titles { flex: 1; }
  .listing-title-old  { font-size: 11px; color: #aaa; text-decoration: line-through; margin-bottom: 4px; }
  .listing-title-new  { font-size: 12px; font-weight: 600; color: var(--dark); }
  .listing-title-only { font-size: 12px; }
  .char-count      { font-size: 10px; color: var(--sage); margin-top: 3px; }
  .char-count.warn { color: var(--rust); }
  .listing-id { font-size: 10px; color: var(--gold); white-space: nowrap; margin-top: 3px; }
  .listing-body { padding: 18px; }
  .section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--border); margin-bottom: 8px; }
  .desc-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .desc-box p { font-size: 11px; line-height: 1.7; color: #555; max-height: 150px; overflow-y: auto; padding: 10px; background: var(--cream); border: 1px solid var(--border); border-radius: 2px; }
  .desc-box.new p { border-color: var(--gold-light); background: #fffdf5; color: var(--dark); }
  .specifics-wrap { margin-top: 12px; }
  .specifics-row  { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .spec-tag     { font-size: 10px; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--border); background: var(--cream); }
  .spec-tag.new { border-color: var(--gold); background: #fffdf5; color: #7a6020; }
  .badge { display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; white-space: nowrap; }
  .badge-pending    { background: var(--gold-light); color: #7a6020; }
  .badge-generating { background: var(--gold-light); color: #7a6020; }
  .badge-generated  { background: #ddeeff; color: #2255aa; }
  .badge-skipped    { background: #eee; color: #999; }
  .badge-updated    { background: #d4ead6; color: var(--sage); }
  .progress-bar  { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .summary-bar { display: flex; gap: 24px; padding: 14px 18px; background: var(--dark); color: var(--cream); font-size: 11px; margin-bottom: 20px; border-radius: 2px; flex-wrap: wrap; }
  .summary-bar span { color: var(--gold); }
  .keyword-tag { display: inline-block; background: var(--gold-light); color: #7a6020; font-size: 10px; padding: 2px 8px; border-radius: 2px; margin: 2px; }
  .step { display: none; }
  .step.active { display: block; }
  .ornament { text-align: center; color: var(--gold); font-size: 18px; margin: 10px 0; letter-spacing: 8px; }
  .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
  .thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); }
  .item-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <header>
    <h1>Fleamarketfrance</h1>
    <span>eBay SEO Rewriter</span>
  </header>

  <div id="status"></div>

  <!-- ÉTAPE 1 : credentials -->
  <div class="step active" id="step-keys">
    <div class="card">
      <div class="card-h2">API Credentials</div>
      <div class="row">
        <div class="field">
          <label>eBay App ID (Client ID)</label>
          <input type="password" id="ebay-app-id" placeholder="XXXX-PRD-XXXX">
        </div>
        <div class="field">
          <label>eBay Cert ID (Client Secret)</label>
          <input type="password" id="ebay-cert-id" placeholder="PRD-XXXX">
        </div>
      </div>
      <div class="field">
        <label>eBay User Token</label>
        <input type="password" id="ebay-token" placeholder="AgAAAA... ou v^1.1#i^1...">
      </div>
      <div class="field">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropic-key" placeholder="sk-ant-...">
      </div>
      <div class="ornament">· · ·</div>
      <button class="btn-primary" onclick="loadListings()">Connect &amp; Load Listings</button>
    </div>
  </div>

  <!-- ÉTAPE 2 : listings -->
  <div class="step" id="step-listings">
    <div class="summary-bar">
      <div>À traiter : <span id="count-total">0</span></div>
      <div>Générés : <span id="count-generated">0</span></div>
      <div>Publiés : <span id="count-pushed">0</span></div>
      <div>Ignorés : <span id="count-skipped">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="action-bar">
      <button class="btn-primary" id="generate-all-btn" onclick="generateAll()" style="flex:1">
        ① Générer toutes les descriptions
      </button>
      <button class="btn-danger" id="push-all-btn" onclick="pushAll()" style="flex:1;display:none;">
        ② Valider &amp; Envoyer tout sur eBay
      </button>
    </div>
    <div class="listings-grid" id="listings-grid"></div>
  </div>
</div>

<script>
// ── Marqueur invisible ajouté dans chaque description publiée ──────────────
const MARKER = '<!-- fmf-optimised -->';

// ── État global ────────────────────────────────────────────────────────────
let listings = [];
let counts = { total: 0, generated: 0, pushed: 0, skipped: 0 };

// ── Helpers UI ─────────────────────────────────────────────────────────────
function setStatus(msg, type = 'info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function updateCounts() {
  document.getElementById('count-total').textContent     = counts.total;
  document.getElementById('count-generated').textContent = counts.generated;
  document.getElementById('count-pushed').textContent    = counts.pushed;
  document.getElementById('count-skipped').textContent   = counts.skipped;
  if (counts.total > 0) {
    document.getElementById('progress-fill').style.width =
      (counts.pushed / counts.total * 100) + '%';
  }
}

function getKeys() {
  return {
    appId:     document.getElementById('ebay-app-id').value.trim(),
    certId:    document.getElementById('ebay-cert-id').value.trim(),
    token:     document.getElementById('ebay-token').value.trim(),
    anthropic: document.getElementById('anthropic-key').value.trim()
  };
}

// ── Proxy eBay XML ─────────────────────────────────────────────────────────
async function ebayXML(callName, xmlBody) {
  const keys = getKeys();
  const resp = await fetch('/ebay', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      headers: {
        'X-EBAY-API-SITEID': '0',
        'X-EBAY-API-COMPATIBILITY-LEVEL': '967',
        'X-EBAY-API-CALL-NAME': callName,
        'X-EBAY-API-APP-NAME': keys.appId,
        'X-EBAY-API-DEV-NAME': '',
        'X-EBAY-API-CERT-NAME': keys.certId,
        'Content-Type': 'text/xml'
      },
      body: xmlBody
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return new DOMParser().parseFromString(data.body, 'text/xml');
}

// ── Charger les annonces (toutes pages, exclure déjà traités) ──────────────
async function loadListings() {
  const keys = getKeys();
  if (!keys.appId || !keys.certId || !keys.token || !keys.anthropic) {
    setStatus('Veuillez remplir tous les champs.', 'error');
    return;
  }

  const now    = new Date();
  const endFrom = now.toISOString().split('.')[0] + 'Z';
  const endTo   = new Date(now.getTime() + 120 * 24 * 60 * 60 * 1000).toISOString().split('.')[0] + 'Z';

  let allItems = [];
  let page = 1, totalPages = 1;

  try {
    do {
      setStatus(`Chargement page ${page} / ${totalPages}…`, 'info');

      const xml = `<?xml version="1.0" encoding="utf-8"?>
<GetSellerListRequest xmlns="urn:ebay:apis:eBLBaseComponents">
  <RequesterCredentials><eBayAuthToken>${keys.token}</eBayAuthToken></RequesterCredentials>
  <DetailLevel>ReturnAll</DetailLevel>
  <EndTimeFrom>${endFrom}</EndTimeFrom>
  <EndTimeTo>${endTo}</EndTimeTo>
  <Pagination><EntriesPerPage>200</EntriesPerPage><PageNumber>${page}</PageNumber></Pagination>
  <IncludeWatchCount>false</IncludeWatchCount>
</GetSellerListRequest>`;

      const doc = await ebayXML('GetSellerList', xml);

      if (page === 1) {
        const ack = doc.getElementsByTagName('Ack')[0]?.textContent;
        if (ack !== 'Success' && ack !== 'Warning') {
          throw new Error(doc.getElementsByTagName('ShortMessage')[0]?.textContent || 'Erreur eBay');
        }
        totalPages = parseInt(doc.getElementsByTagName('TotalNumberOfPages')[0]?.textContent || '1', 10);
      }

      Array.from(doc.getElementsByTagName('Item')).forEach(item => {
        const desc = item.getElementsByTagName('Description')[0]?.textContent || '';

        // Exclure les articles déjà traités par l'outil
        if (desc.includes(MARKER)) return;

        // Photos
        const pictures = Array.from(item.getElementsByTagName('PictureURL'))
          .map(p => p.textContent.trim()).filter(Boolean);

        // Item Specifics existants
        const existingSpecifics = {};
        Array.from(item.getElementsByTagName('NameValueList')).forEach(nvl => {
          const n = nvl.getElementsByTagName('Name')[0]?.textContent || '';
          const v = nvl.getElementsByTagName('Value')[0]?.textContent || '';
          if (n && v) existingSpecifics[n] = v;
        });

        allItems.push({
          id: item.getElementsByTagName('ItemID')[0]?.textContent || '',
          title: item.getElementsByTagName('Title')[0]?.textContent || '',
          description: desc,
          pictures,
          existingSpecifics,
          status: 'pending',
          newTitle: null,
          newDescription: null,
          keyword: null,
          newSpecifics: {}
        });
      });

      page++;
    } while (page <= totalPages);

    if (allItems.length === 0) {
      setStatus('Tous vos articles ont déjà été optimisés par cet outil (marqueur fmf-optimised détecté).', 'success');
      return;
    }

    listings = allItems;
    counts = { total: listings.length, generated: 0, pushed: 0, skipped: 0 };
    updateCounts();
    setStatus(`${listings.length} article(s) non traité(s) récupérés sur ${totalPages} page(s).`, 'success');
    document.getElementById('step-keys').classList.remove('active');
    document.getElementById('step-listings').classList.add('active');
    renderListings();

  } catch (err) {
    setStatus('Erreur : ' + err.message, 'error');
  }
}

// ── Rendu de la liste ──────────────────────────────────────────────────────
function renderListings() {
  const grid = document.getElementById('listings-grid');
  grid.innerHTML = '';
  listings.forEach((item, i) => grid.appendChild(buildCard(item, i)));
}

function buildCard(item, i) {
  const div = document.createElement('div');
  div.className = 'listing-item';
  div.id = 'item-' + i;

  const badgeMap = {
    pending:    '<span class="badge badge-pending">En attente</span>',
    generating: '<span class="badge badge-generating"><span class="spinner"></span>Génération…</span>',
    generated:  '<span class="badge badge-generated">Généré</span>',
    skipped:    '<span class="badge badge-skipped">Ignoré</span>',
    updated:    '<span class="badge badge-updated">✓ Publié</span>'
  };

  // ── Titre ──
  let titleHTML = '';
  if (item.newTitle) {
    const warn = item.newTitle.length > 80 ? 'warn' : '';
    titleHTML = `
      <div class="listing-titles">
        <div class="listing-title-old">${escapeHTML(item.title)}</div>
        <div class="listing-title-new">${escapeHTML(item.newTitle)}</div>
        <div class="char-count ${warn}">${item.newTitle.length} / 80 car.</div>
      </div>`;
  } else {
    titleHTML = `<div class="listing-titles"><div class="listing-title-only">${escapeHTML(item.title)}</div></div>`;
  }

  // ── Miniatures ──
  const thumbsHTML = item.pictures.length
    ? `<div class="thumbs">${item.pictures.slice(0, 5).map(u =>
        `<img class="thumb" src="${u}" onerror="this.style.display='none'">`).join('')}</div>`
    : '';

  // ── Description ──
  const oldText = item.description
    ? item.description.replace(/<[^>]+>/g, ' ').replace(/\s+/g,' ').substring(0, 400) + '…'
    : 'Aucune description';

  const newDescHTML = item.newDescription
    ? `<div class="desc-box new">
         <div class="section-label">Nouvelle description</div>
         <p>${item.newDescription.replace(/\n/g,'<br>')}</p>
         ${item.keyword ? `<div style="margin-top:8px"><span class="keyword-tag">🔑 ${escapeHTML(item.keyword)}</span></div>` : ''}
       </div>`
    : `<div class="desc-box new">
         <div class="section-label">Nouvelle description</div>
         <p style="color:var(--border);font-style:italic">Pas encore générée</p>
       </div>`;

  // ── Item Specifics ──
  const allKeys = new Set([...Object.keys(item.existingSpecifics), ...Object.keys(item.newSpecifics)]);
  let specificsHTML = '';
  if (allKeys.size > 0) {
    const tags = Array.from(allKeys).map(k => {
      const isNew = item.newSpecifics[k] !== undefined && item.newSpecifics[k] !== item.existingSpecifics[k];
      const val = item.newSpecifics[k] !== undefined ? item.newSpecifics[k] : item.existingSpecifics[k];
      return `<span class="spec-tag ${isNew ? 'new' : ''}">${escapeHTML(k)}: ${escapeHTML(String(val))}</span>`;
    }).join('');
    const hasNew = Object.keys(item.newSpecifics).length > 0;
    specificsHTML = `<div class="specifics-wrap">
      <div class="section-label">Item Specifics${hasNew ? ' — 🟡 modifiés/ajoutés en jaune' : ''}</div>
      <div class="specifics-row">${tags}</div>
    </div>`;
  }

  // ── Boutons individuels ──
  let actionsHTML = '';
  if (item.status === 'pending') {
    actionsHTML = `<div class="item-actions">
      <button class="btn-skip" onclick="skipItem(${i})">Ignorer</button>
      <button class="btn-small" onclick="generateOne(${i})">Générer</button>
    </div>`;
  } else if (item.status === 'generated') {
    actionsHTML = `<div class="item-actions">
      <button class="btn-skip" onclick="skipItem(${i})">Ignorer cet article</button>
    </div>`;
  }

  div.innerHTML = `
    <div class="listing-header">
      ${titleHTML}
      <div style="text-align:right">
        <div>${badgeMap[item.status] || ''}</div>
        <div class="listing-id">#${item.id}</div>
      </div>
    </div>
    <div class="listing-body">
      ${thumbsHTML}
      <div class="desc-compare">
        <div class="desc-box">
          <div class="section-label">Description actuelle</div>
          <p>${oldText}</p>
        </div>
        ${newDescHTML}
      </div>
      ${specificsHTML}
      ${actionsHTML}
    </div>`;

  return div;
}

function refreshCard(i) {
  document.getElementById('item-' + i).replaceWith(buildCard(listings[i], i));
}

// ── Générer un article (photos + texte → Claude) ───────────────────────────
async function generateOne(i) {
  const keys = getKeys();
  listings[i].status = 'generating';
  refreshCard(i);

  try {
    const userContent = [];

    // Charger les photos en base64 via le proxy /fetch_image (max 4)
    for (const url of listings[i].pictures.slice(0, 4)) {
      try {
        const r = await fetch('/fetch_image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        if (r.ok) {
          const d = await r.json();
          if (d.base64 && d.mediaType) {
            userContent.push({ type: 'image', source: { type: 'base64', media_type: d.mediaType, data: d.base64 } });
          }
        }
      } catch (e) { /* image inaccessible, on ignore */ }
    }

    const existingSpecsStr = Object.entries(listings[i].existingSpecifics)
      .map(([k, v]) => `${k}: ${v}`).join('\n') || 'Aucun';

    userContent.push({ type: 'text', text:
`You are an SEO expert for a French vintage/antiques shop called Fleamarketfrance selling on eBay.
Analyze the product photos (if provided) AND the information below, then generate fully optimized content.

CURRENT TITLE: ${listings[i].title}
CURRENT DESCRIPTION: ${listings[i].description ? listings[i].description.replace(/<[^>]+>/g,' ').substring(0,1000) : 'No description'}
EXISTING ITEM SPECIFICS:
${existingSpecsStr}

RULES — follow all of them strictly:
1. KEYWORD: Pick the single most searched SEO keyword for this item (based on photos + info). It must appear in both the new title and as <h2> in the description.
2. NEW TITLE: Maximum 80 characters total. The series of digits at the very end of the current title MUST be kept unchanged and placed at the end of the new title. Include the keyword naturally.
3. DESCRIPTION: Minimum 160 words. English only. Flowing prose, no bullet points. Tone: refined, knowledgeable, evocative of French brocante culture. Must include <h2>keyword</h2> near the start. Must end EXACTLY with this sentence: "95% of my items are tariff-free to the US."
4. ITEM SPECIFICS: Return a complete set. Keep correct existing values, overwrite wrong ones using photo evidence, add all missing relevant fields (e.g. Material, Style, Period/Era, Country of Origin, Color, Type, Dimensions if visible, Condition, Theme...).

Respond ONLY with a valid JSON object — no markdown, no backticks, no extra text:
{"keyword":"...","newTitle":"...","description":"...","itemSpecifics":{"Name":"Value",...}}`
    });

    const resp = await fetch('/anthropic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: keys.anthropic,
        payload: {
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          messages: [{ role: 'user', content: userContent }]
        }
      })
    });

    let data;
    try {
      data = await resp.json();
    } catch(e) {
      throw new Error(`Réponse invalide du serveur (HTTP ${resp.status}) — vérifiez que app.py est bien déployé sur Render.`);
    }

    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    let raw = data.content[0].text.trim()
      .replace(/^```json\s*/i, '').replace(/^```/, '').replace(/```$/, '').trim();

    const parsed = JSON.parse(raw);

    listings[i].keyword        = parsed.keyword        || '';
    listings[i].newTitle       = parsed.newTitle        || listings[i].title;
    listings[i].newDescription = parsed.description     || '';
    listings[i].newSpecifics   = parsed.itemSpecifics   || {};
    listings[i].status         = 'generated';
    counts.generated++;
    updateCounts();

    // Afficher le bouton push dès qu'au moins un article est généré
    document.getElementById('push-all-btn').style.display = 'block';

  } catch (err) {
    listings[i].status = 'pending';
    setStatus('Erreur #' + listings[i].id + ' : ' + err.message, 'error');
  }

  refreshCard(i);
}

// ── Générer TOUT ───────────────────────────────────────────────────────────
async function generateAll() {
  const btn = document.getElementById('generate-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Génération en cours…';

  for (let i = 0; i < listings.length; i++) {
    if (listings[i].status === 'pending') {
      await generateOne(i);
      await new Promise(r => setTimeout(r, 600));
    }
  }

  btn.disabled = false;
  btn.textContent = '① Regénérer tout';
  document.getElementById('push-all-btn').style.display = 'block';
  setStatus(`${counts.generated} description(s) générée(s). Vérifiez puis cliquez sur ② pour tout publier sur eBay.`, 'success');
}

// ── Ignorer un article ─────────────────────────────────────────────────────
function skipItem(i) {
  if (listings[i].status === 'generated') counts.generated--;
  listings[i].status = 'skipped';
  counts.skipped++;
  updateCounts();
  refreshCard(i);
}

// ── Pousser UN article sur eBay ────────────────────────────────────────────
async function pushOne(i) {
  const keys = getKeys();
  const item  = listings[i];

  // Item Specifics XML
  const specsXML = Object.entries(item.newSpecifics).map(([name, value]) =>
    `<NameValueList><Name>${escapeXML(name)}</Name><Value>${escapeXML(String(value))}</Value></NameValueList>`
  ).join('');

  // Description finale avec marqueur invisible
  const finalDesc = item.newDescription + '\n' + MARKER;

  const xml = `<?xml version="1.0" encoding="utf-8"?>
<ReviseItemRequest xmlns="urn:ebay:apis:eBLBaseComponents">
  <RequesterCredentials><eBayAuthToken>${keys.token}</eBayAuthToken></RequesterCredentials>
  <Item>
    <ItemID>${item.id}</ItemID>
    <Title>${escapeXML(item.newTitle || item.title)}</Title>
    <Description><![CDATA[${finalDesc}]]></Description>
    ${specsXML ? `<ItemSpecifics>${specsXML}</ItemSpecifics>` : ''}
  </Item>
</ReviseItemRequest>`;

  const doc = await ebayXML('ReviseItem', xml);
  const ack  = doc.getElementsByTagName('Ack')[0]?.textContent;
  if (ack !== 'Success' && ack !== 'Warning') {
    throw new Error(doc.getElementsByTagName('ShortMessage')[0]?.textContent || 'Erreur eBay');
  }

  listings[i].status = 'updated';
  counts.pushed++;
  if (counts.generated > 0) counts.generated--;
  updateCounts();
  refreshCard(i);
}

// ── Pousser TOUT sur eBay ──────────────────────────────────────────────────
async function pushAll() {
  const toSend = listings.filter(l => l.status === 'generated').length;
  if (toSend === 0) { setStatus('Aucun article généré à envoyer.', 'error'); return; }

  const ok = confirm(`Vous êtes sur le point d'envoyer ${toSend} article(s) sur eBay.\nLe titre, la description et les item specifics seront écrasés. Confirmer ?`);
  if (!ok) return;

  const btn = document.getElementById('push-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Publication en cours…';

  let success = 0, errors = 0;
  for (let i = 0; i < listings.length; i++) {
    if (listings[i].status === 'generated') {
      try {
        await pushOne(i);
        success++;
        await new Promise(r => setTimeout(r, 400));
      } catch (err) {
        errors++;
        setStatus('Erreur #' + listings[i].id + ' : ' + err.message, 'error');
      }
    }
  }

  btn.disabled = false;
  btn.textContent = '② Valider & Envoyer tout sur eBay';
  setStatus(`✓ ${success} article(s) mis à jour sur eBay.${errors > 0 ? ' ' + errors + ' erreur(s).' : ''}`, 'success');
}

// ── Utilitaires ────────────────────────────────────────────────────────────
function escapeXML(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
