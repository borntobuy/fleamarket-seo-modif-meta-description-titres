<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleamarketfrance — eBay SEO Rewriter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --dark: #1a1612;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #8b3a2a;
    --sage: #4a5c4e;
    --border: #d4c9b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--dark); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 40px 20px; }
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
  .container { max-width: 860px; margin: 0 auto; }
  header { border-bottom: 2px solid var(--gold); padding-bottom: 24px; margin-bottom: 40px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header span { font-size: 11px; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
  .card { background: white; border: 1px solid var(--border); border-radius: 2px; padding: 28px; margin-bottom: 20px; }
  .card h2 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; font-style: italic; color: var(--rust); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .card h2::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--rust); }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--sage); margin-bottom: 6px; }
  input, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); background: var(--cream); font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dark); border-radius: 2px; outline: none; transition: border-color 0.2s; }
  input:focus, textarea:focus { border-color: var(--gold); }
  input[type="password"] { letter-spacing: 2px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  button { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 28px; border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--dark); color: var(--cream); width: 100%; }
  .btn-primary:hover { background: var(--rust); }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .btn-small { background: var(--sage); color: white; font-size: 10px; padding: 8px 16px; }
  .btn-small:hover { background: var(--dark); }
  .btn-approve { background: var(--sage); color: white; padding: 10px 20px; font-size: 10px; }
  .btn-approve:hover { background: #2d3d30; }
  .btn-skip { background: transparent; color: var(--border); border: 1px solid var(--border); padding: 10px 20px; font-size: 10px; }
  .btn-skip:hover { border-color: var(--dark); color: var(--dark); }
  #status { padding: 14px; border-radius: 2px; font-size: 11px; margin-bottom: 20px; display: none; }
  #status.info { background: #e8f0e9; border: 1px solid var(--sage); color: var(--sage); display: block; }
  #status.error { background: #f5e8e6; border: 1px solid var(--rust); color: var(--rust); display: block; }
  #status.success { background: #e8f0e9; border: 1px solid var(--sage); color: var(--sage); display: block; }
  .listings-grid { display: flex; flex-direction: column; gap: 16px; }
  .listing-item { border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .listing-header { background: var(--cream); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .listing-title { font-size: 12px; font-weight: 400; flex: 1; margin-right: 12px; }
  .listing-id { font-size: 10px; color: var(--gold); }
  .listing-body { padding: 18px; }
  .desc-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .desc-box h4 { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--border); margin-bottom: 8px; }
  .desc-box p { font-size: 11px; line-height: 1.7; color: #555; max-height: 120px; overflow-y: auto; padding: 10px; background: var(--cream); border: 1px solid var(--border); border-radius: 2px; }
  .desc-box.new p { border-color: var(--gold-light); background: #fffdf5; color: var(--dark); }
  .listing-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .badge { display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
  .badge-pending { background: var(--gold-light); color: #7a6020; }
  .badge-approved { background: #d4ead6; color: var(--sage); }
  .badge-skipped { background: #eee; color: #999; }
  .badge-updated { background: #d4ead6; color: var(--sage); }
  .badge-generating { background: var(--gold-light); color: #7a6020; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .summary-bar { display: flex; gap: 24px; padding: 14px 18px; background: var(--dark); color: var(--cream); font-size: 11px; margin-bottom: 20px; border-radius: 2px; }
  .summary-bar span { color: var(--gold); }
  .keyword-tag { display: inline-block; background: var(--gold-light); color: #7a6020; font-size: 10px; padding: 2px 8px; border-radius: 2px; margin: 2px; }
  .step { display: none; }
  .step.active { display: block; }
  .ornament { text-align: center; color: var(--gold); font-size: 18px; margin: 10px 0; letter-spacing: 8px; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <header>
    <h1>Fleamarketfrance</h1>
    <span>eBay SEO Rewriter</span>
  </header>

  <div id="status"></div>

  <div class="step active" id="step-keys">
    <div class="card">
      <h2>API Credentials</h2>
      <div class="row">
        <div class="field">
          <label>eBay App ID (Client ID)</label>
          <input type="password" id="ebay-app-id" placeholder="XXXX-PRD-XXXX">
        </div>
        <div class="field">
          <label>eBay Cert ID (Client Secret)</label>
          <input type="password" id="ebay-cert-id" placeholder="PRD-XXXX">
        </div>
      </div>
      <div class="field">
        <label>eBay User Token</label>
        <input type="password" id="ebay-token" placeholder="AgAAAA... ou v^1.1#i^1...">
      </div>
      <div class="field">
        <label>Anthropic API Key</label>
        <input type="password" id="anthropic-key" placeholder="sk-ant-...">
      </div>
      <div class="ornament">· · ·</div>
      <button class="btn-primary" onclick="loadListings()">Connect & Load Listings</button>
    </div>
  </div>

  <div class="step" id="step-listings">
    <div class="summary-bar">
      <div>Listings: <span id="count-total">0</span></div>
      <div>Generated: <span id="count-generated">0</span></div>
      <div>Approved: <span id="count-approved">0</span></div>
      <div>Pushed: <span id="count-pushed">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <button class="btn-primary" id="generate-all-btn" onclick="generateAll()" style="flex:1">Generate All Descriptions</button>
      <button class="btn-primary" id="push-all-btn" onclick="pushAll()" style="flex:1; display:none; background:var(--rust)">Push All Approved to eBay</button>
    </div>
    <div class="listings-grid" id="listings-grid"></div>
  </div>
</div>

<script>
let listings = [];
let counts = { total: 0, generated: 0, approved: 0, pushed: 0 };

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
}

function updateCounts() {
  document.getElementById('count-total').textContent = counts.total;
  document.getElementById('count-generated').textContent = counts.generated;
  document.getElementById('count-approved').textContent = counts.approved;
  document.getElementById('count-pushed').textContent = counts.pushed;
  if (counts.total > 0) {
    document.getElementById('progress-fill').style.width = (counts.pushed / counts.total * 100) + '%';
  }
}

function getKeys() {
  return {
    appId: document.getElementById('ebay-app-id').value.trim(),
    certId: document.getElementById('ebay-cert-id').value.trim(),
    token: document.getElementById('ebay-token').value.trim(),
    anthropic: document.getElementById('anthropic-key').value.trim()
  };
}

async function ebayREST(path, method, token, body) {
  const resp = await fetch('/ebay_rest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method, token, body })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadListings() {
  const keys = getKeys();
  if (!keys.appId || !keys.certId || !keys.token || !keys.anthropic) {
    setStatus('Veuillez remplir tous les champs.', 'error');
    return;
  }
  setStatus('Connexion à eBay...', 'info');

  try {
    // Use eBay REST Inventory API
    const resp = await ebayREST('/sell/inventory/v1/inventory_item?limit=200', 'GET', keys.token, null);
    // Afficher la réponse brute pour debug
    let dbx = document.getElementById('debug-xml');
    if (!dbx) { dbx = document.createElement('textarea'); dbx.id='debug-xml'; dbx.style.cssText='width:100%;height:180px;font-size:10px;font-family:monospace;margin-top:12px;padding:8px;border:1px solid #d4c9b0;background:#f5f0e8;'; document.getElementById('status').insertAdjacentElement('afterend', dbx); }
    dbx.value = 'HTTP ' + resp.status + '\n' + resp.body;
    const data = resp.json || {};
    const items = data.inventoryItems || [];
    listings = items.map(item => ({
      id: item.sku || '',
      title: item.product?.title || '',
      description: item.product?.description || '',
      status: 'pending',
      newDescription: null,
      keyword: null
    }));
    if (listings.length === 0) { setStatus('Aucun article trouvé. HTTP ' + resp.status + ' — voir réponse ci-dessous', 'error'); return; }
    counts.total = listings.length;
    updateCounts();
    setStatus(`${listings.length} articles chargés.`, 'success');
    document.getElementById('step-keys').classList.remove('active');
    document.getElementById('step-listings').classList.add('active');
    renderListings();
  } catch(err) {
    setStatus('Erreur : ' + err.message, 'error');
  }
}

function renderListings() {
  const grid = document.getElementById('listings-grid');
  grid.innerHTML = '';
  listings.forEach((item, i) => grid.appendChild(buildCard(item, i)));
}

function buildCard(item, i) {
  const div = document.createElement('div');
  div.className = 'listing-item';
  div.id = 'item-' + i;
  const badgeMap = {
    pending: '<span class="badge badge-pending">En attente</span>',
    generating: '<span class="badge badge-generating"><span class="spinner"></span>Génération...</span>',
    generated: '<span class="badge badge-pending">À relire</span>',
    approved: '<span class="badge badge-approved">Approuvé</span>',
    skipped: '<span class="badge badge-skipped">Ignoré</span>',
    updated: '<span class="badge badge-updated">✓ Publié</span>'
  };
  const newDescHTML = item.newDescription
    ? `<div class="desc-box new"><h4>Nouvelle description</h4><p>${item.newDescription.replace(/\n/g,'<br>')}</p>${item.keyword ? `<div style="margin-top:8px"><span class="keyword-tag">🔑 ${item.keyword}</span></div>` : ''}</div>`
    : `<div class="desc-box new"><h4>Nouvelle description</h4><p style="color:var(--border);font-style:italic">Pas encore générée</p></div>`;
  const actionsHTML = item.status === 'generated'
    ? `<div class="listing-actions"><button class="btn-skip" onclick="skipItem(${i})">Ignorer</button><button class="btn-approve" onclick="approveItem(${i})">Approuver</button></div>`
    : item.status === 'approved'
    ? `<div class="listing-actions"><button class="btn-skip" onclick="skipItem(${i})">Annuler</button></div>`
    : item.status === 'pending'
    ? `<div class="listing-actions"><button class="btn-small" onclick="generateOne(${i})">Générer</button></div>`
    : '';
  div.innerHTML = `
    <div class="listing-header">
      <div class="listing-title">${item.title}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="listing-id">#${item.id}</span>
        ${badgeMap[item.status] || ''}
      </div>
    </div>
    <div class="listing-body">
      <div class="desc-compare">
        <div class="desc-box"><h4>Description actuelle</h4><p>${item.description ? item.description.replace(/<[^>]+>/g,' ').substring(0,400)+'...' : 'Aucune description'}</p></div>
        ${newDescHTML}
      </div>
      ${actionsHTML}
    </div>`;
  return div;
}

function refreshCard(i) {
  document.getElementById('item-'+i).replaceWith(buildCard(listings[i], i));
}

async function generateOne(i) {
  const keys = getKeys();
  listings[i].status = 'generating';
  refreshCard(i);

  const prompt = `You are an SEO expert for a French vintage/brocante shop called Fleamarketfrance selling on eBay.

Rewrite this eBay product listing description following these rules:
- Exactly 160 words
- In English
- Find and use the single most relevant SEO keyword, place it in the first sentence
- End with exactly this sentence: "95% of my items are tariff-free to the US."
- Tone: refined, knowledgeable, evocative of French brocante culture
- No bullet points, flowing prose only

Product title: ${listings[i].title}
Current description: ${listings[i].description ? listings[i].description.replace(/<[^>]+>/g,' ').substring(0,800) : 'No description available'}

Respond ONLY with a JSON object (no markdown, no backticks):
{"keyword":"the main seo keyword","description":"the full 160-word description"}`;

  try {
    const resp = await fetch('/anthropic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: keys.anthropic, payload: { model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] } })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || data.error);
    const parsed = JSON.parse(data.content[0].text.trim());
    listings[i].newDescription = parsed.description;
    listings[i].keyword = parsed.keyword;
    listings[i].status = 'generated';
    counts.generated++;
    updateCounts();
  } catch(err) {
    listings[i].status = 'pending';
    setStatus('Erreur pour #' + listings[i].id + ': ' + err.message, 'error');
  }
  refreshCard(i);
}

async function generateAll() {
  const btn = document.getElementById('generate-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Génération en cours...';
  for (let i = 0; i < listings.length; i++) {
    if (listings[i].status === 'pending') {
      await generateOne(i);
      await new Promise(r => setTimeout(r, 500));
    }
  }
  btn.disabled = false;
  btn.textContent = 'Tout regénérer';
  document.getElementById('push-all-btn').style.display = 'block';
  setStatus('Descriptions générées. Relisez et approuvez avant de publier.', 'success');
}

function approveItem(i) {
  listings[i].status = 'approved';
  counts.approved++;
  updateCounts();
  refreshCard(i);
}

function skipItem(i) {
  if (listings[i].status === 'approved') counts.approved--;
  listings[i].status = 'skipped';
  updateCounts();
  refreshCard(i);
}

async function pushOne(i) {
  const keys = getKeys();
  const xml = `<?xml version="1.0" encoding="utf-8"?>
<ReviseItemRequest xmlns="urn:ebay:apis:eBLBaseComponents">
  <RequesterCredentials><eBayAuthToken>${keys.token}</eBayAuthToken></RequesterCredentials>
  <Item><ItemID>${listings[i].id}</ItemID><Description><![CDATA[${listings[i].newDescription}]]></Description></Item>
</ReviseItemRequest>`;
  const doc = await ebayCall('ReviseItem', xml);
  const ack = doc.getElementsByTagName('Ack')[0]?.textContent;
  if (ack !== 'Success' && ack !== 'Warning') {
    throw new Error(doc.getElementsByTagName('ShortMessage')[0]?.textContent || 'Erreur eBay');
  }
  listings[i].status = 'updated';
  counts.pushed++;
  updateCounts();
  refreshCard(i);
}

async function pushAll() {
  const btn = document.getElementById('push-all-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Publication...';
  let success = 0, errors = 0;
  for (let i = 0; i < listings.length; i++) {
    if (listings[i].status === 'approved') {
      try { await pushOne(i); success++; await new Promise(r => setTimeout(r, 300)); }
      catch(err) { errors++; setStatus('Erreur #' + listings[i].id + ': ' + err.message, 'error'); }
    }
  }
  btn.disabled = false;
  btn.textContent = 'Push All Approved to eBay';
  setStatus(`${success} articles mis à jour sur eBay.${errors > 0 ? ' '+errors+' erreurs.' : ''}`, 'success');
}
</script>
</body>
</html>
